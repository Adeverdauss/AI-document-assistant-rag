<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>AI Document Assistant</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="app">

    <!-- ====================================================== -->
    <!-- LEFT SIDEBAR -->
    <!-- ====================================================== -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <h2>

                📂 Documents

            </h2>

            <div class="upload-box">

                <input

                    type="file"

                    id="pdf"

                    accept=".pdf"

                >

                <button

                    id="upload-btn"

                    onclick="uploadPDF()"

                >

                    Upload PDF

                </button>

            </div>

        </div>

        <div

            id="doc-list"

            class="sidebar-body"

        >

            Loading Documents...

        </div>

    </aside>


    <!-- ====================================================== -->
    <!-- CENTER -->
    <!-- ====================================================== -->

    <main class="main">

        <div class="header">

            <div class="logo">

                🤖

            </div>

            <div>

                <h2>

                    AI Document Assistant

                </h2>

                <span>

                    Retrieval Augmented Generation

                </span>

            </div>

        </div>


        <div

            id="chat-box"

            class="chat-box"

        >

        </div>


        <div class="input-area">

            <input

                id="question"

                type="text"

                placeholder="Ask anything about your document..."

                autocomplete="off"

            >

            <button

                id="send-btn"

            >

                Send

            </button>

        </div>

    </main>


    <!-- ====================================================== -->
    <!-- RIGHT -->
    <!-- ====================================================== -->

    <aside class="right-panel">

        <div class="right-header">

            <h2>

                📊 Statistics

            </h2>

        </div>

        <div class="right-body">

            <div

                id="stats"

                class="stats-card"

            >

                Loading...

            </div>


            <div class="stack-card">

                <h3>

                    AI Stack

                </h3>

                <div class="stack-item">

                    <b>Embedding</b>

                    <span>

                        MiniLM-L6-v2

                    </span>

                </div>

                <div class="stack-item">

                    <b>Retriever</b>

                    <span>

                        FAISS

                    </span>

                </div>

                <div class="stack-item">

                    <b>Reranker</b>

                    <span>

                        BGE Reranker

                    </span>

                </div>

                <div class="stack-item">

                    <b>LLM</b>

                    <span>

                        Gemini 2.5 Flash

                    </span>

                </div>

            </div>

        </div>

    </aside>

</div>

<script

src="{{ url_for('static', filename='script.js') }}">

</script>

</body>

</html>
